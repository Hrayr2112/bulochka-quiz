<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Квиз ко Дню Рождения Бусинки</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a0f;
    color: #fff;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }

  .app {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .screen {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== WELCOME ===== */
  .welcome-subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .welcome-title { text-align: center; margin-bottom: 8px; }
  .welcome-title .line1 {
    font-size: 42px; font-weight: 900; color: #f59e0b; display: block; line-height: 1.1;
  }
  .welcome-title .line2 {
    font-size: 28px; font-weight: 700; color: #fff; display: block; line-height: 1.2;
  }
  .welcome-title .line3 {
    font-size: 42px; font-weight: 900; color: #f59e0b; display: block; line-height: 1.1;
  }
  .welcome-meta {
    font-size: 13px; color: #888; margin: 16px 0 30px;
  }
  .prize-card {
    background: #fff; border-radius: 16px; padding: 24px;
    margin-bottom: 10px; display: flex; flex-direction: column;
    align-items: center; width: 200px;
  }
  .prize-island {
    font-size: 72px; margin-bottom: 12px;
  }
  .prize-label {
    font-size: 10px; letter-spacing: 2px; color: #999;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .prize-name { font-size: 18px; font-weight: 700; color: #111; }
  .prize-color { font-size: 13px; color: #f97316; }

  .bonus-hint {
    font-size: 13px; color: #f59e0b; margin: 12px 0 8px;
    background: #1a1a0a; border: 1px solid #f59e0b33;
    padding: 8px 16px; border-radius: 12px;
  }
  .dots { display: flex; gap: 6px; margin: 16px 0 30px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
  .dot.active { background: #fff; }

  .btn-start {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff; border: none; padding: 16px 48px; border-radius: 40px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 10px; letter-spacing: 1px;
    box-shadow: 0 4px 24px rgba(249, 115, 22, 0.4);
  }
  .btn-start:active { transform: scale(0.96); }
  .play-icon {
    width: 0; height: 0; border-style: solid;
    border-width: 6px 0 6px 10px;
    border-color: transparent transparent transparent #fff;
  }

  /* ===== QUESTION ===== */
  .question-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  .question-badge {
    background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 20px;
    padding: 6px 16px; font-size: 11px; letter-spacing: 3px;
    color: #888; text-transform: uppercase;
  }
  .score-badge {
    background: #0a2e1a; border: 1px solid #16a34a; border-radius: 20px;
    padding: 6px 12px; font-size: 11px; color: #4ade80; font-weight: 600;
  }
  .question-text {
    font-size: 20px; font-weight: 600; text-align: center;
    line-height: 1.4; margin-bottom: 24px; max-width: 340px;
  }
  .timer-container {
    position: relative; width: 56px; height: 56px; margin-bottom: 4px;
  }
  .timer-ring { transform: rotate(-90deg); }
  .timer-ring-bg { fill: none; stroke: #1a1a2e; stroke-width: 3; }
  .timer-ring-progress {
    fill: none; stroke: #f97316; stroke-width: 3;
    stroke-linecap: round; transition: stroke-dashoffset 1s linear;
  }
  .timer-number {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700;
  }
  .timer-label {
    font-size: 10px; letter-spacing: 2px; color: #666;
    text-transform: uppercase; margin-bottom: 40px;
  }
  .options { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .option {
    background: #12121e; border: 1px solid #1e1e30; border-radius: 14px;
    padding: 16px 20px; display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .option:active { transform: scale(0.98); }
  .option .letter {
    width: 28px; height: 28px; border-radius: 50%;
    background: #1a1a2e; border: 1px solid #2a2a3e;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #888; flex-shrink: 0;
  }
  .option .text { font-size: 15px; color: #ccc; line-height: 1.3; }
  .option.correct { background: #0a2e1a; border-color: #16a34a; }
  .option.correct .letter { background: #16a34a; border-color: #16a34a; color: #fff; }
  .option.correct .text { color: #fff; }
  .option.wrong { background: #2e0a0a; border-color: #dc2626; }
  .option.wrong .letter { background: #dc2626; border-color: #dc2626; color: #fff; }
  .option.wrong .text { color: #fff; }
  .option.disabled { pointer-events: none; }

  /* ===== FINAL ===== */
  .final-icon { font-size: 64px; margin-bottom: 16px; }
  .final-title {
    font-size: 28px; font-weight: 800; text-align: center;
    margin-bottom: 8px;
  }
  .final-sub {
    font-size: 16px; color: #888; text-align: center; margin-bottom: 8px;
  }
  .final-score {
    font-size: 48px; font-weight: 900; margin: 16px 0;
  }
  .final-label {
    font-size: 14px; color: #888; margin-bottom: 24px;
  }
  .result-bar-container {
    width: 100%; height: 12px; background: #1a1a2e;
    border-radius: 6px; margin-bottom: 32px; overflow: hidden;
  }
  .result-bar {
    height: 100%; border-radius: 6px;
    transition: width 1.5s ease;
  }
  .bonus-result {
    background: linear-gradient(135deg, #f59e0b22, #f9731622);
    border: 1px solid #f59e0b;
    border-radius: 16px; padding: 16px 24px;
    text-align: center; margin-bottom: 24px;
    font-size: 15px; font-weight: 600; color: #f59e0b;
    line-height: 1.5; display: none;
  }
  .bonus-result.visible { display: block; animation: fadeIn 0.5s ease; }
  .btn-share {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff; border: none; padding: 16px 48px; border-radius: 40px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    letter-spacing: 1px; box-shadow: 0 4px 24px rgba(249, 115, 22, 0.4);
    margin-bottom: 16px;
  }
  .btn-share:active { transform: scale(0.96); }
  .btn-retry {
    background: transparent; color: #888; border: 1px solid #333;
    padding: 14px 40px; border-radius: 40px; font-size: 14px;
    font-weight: 600; cursor: pointer;
  }
  .btn-retry:active { transform: scale(0.96); }

  /* ===== CONFETTI ===== */
  .confetti-container {
    position: fixed; inset: 0; pointer-events: none;
    z-index: 100; overflow: hidden;
  }
  .confetti-piece {
    position: absolute; width: 8px; height: 8px; top: -10px;
    animation: confettiFall 3s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ===== PROGRESS BAR ===== */
  .progress-bar-container {
    position: fixed; top: 0; left: 0; right: 0;
    height: 4px; background: #1a1a2e; z-index: 50;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #f97316, #f59e0b);
    transition: width 0.5s ease; border-radius: 0 2px 2px 0;
  }
</style>
</head>
<body>

<div class="progress-bar-container">
  <div class="progress-bar" id="progressBar" style="width: 0%"></div>
</div>

<div class="app">

  <!-- WELCOME -->
  <div class="screen active" id="welcomeScreen">
    <div class="welcome-subtitle">КВИЗ КО ДНЮ РОЖДЕНИЯ БУСИНКИ</div>
    <div class="welcome-title">
      <span class="line1">ЗНАЕШЬ</span>
      <span class="line2">ЛИ ТЫ</span>
      <span class="line3">БУЛОЧКУ?</span>
    </div>
    <div class="welcome-meta">50 вопросов · 1 правильный путь · 1 большой приз</div>
    <div class="prize-card">
      <div class="prize-island">🏝️</div>
      <div class="prize-label">ГЛАВНЫЙ ПРИЗ</div>
      <div class="prize-name">Поездка</div>
      <div class="prize-color">На остров мечты 🌊</div>
    </div>
    <div class="bonus-hint">40+ правильных = бонусный приз 🎁</div>
    <div class="dots">
      <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <button class="btn-start" onclick="startGame()">
      <div class="play-icon"></div>
      НАЧАТЬ ИГРУ
    </button>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="questionScreen">
    <div class="question-header">
      <div class="question-badge" id="questionBadge">ВОПРОС 1</div>
      <div class="score-badge" id="scoreBadge">✓ 0</div>
    </div>
    <div class="question-text" id="questionText"></div>
    <div class="timer-container">
      <svg class="timer-ring" width="56" height="56" viewBox="0 0 56 56">
        <circle class="timer-ring-bg" cx="28" cy="28" r="24"/>
        <circle class="timer-ring-progress" id="timerRing" cx="28" cy="28" r="24"
          stroke-dasharray="150.8" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-number" id="timerNumber">15</div>
    </div>
    <div class="timer-label">СЕКУНД</div>
    <div class="options" id="optionsContainer"></div>
  </div>

  <!-- FINAL -->
  <div class="screen" id="finalScreen">
    <div class="final-icon" id="finalIcon">🏆</div>
    <div class="final-title" id="finalTitle"></div>
    <div class="final-sub" id="finalSub"></div>
    <div class="final-score" id="finalScore"></div>
    <div class="final-label">правильных из 50</div>
    <div class="result-bar-container">
      <div class="result-bar" id="resultBar" style="width: 0%"></div>
    </div>
    <div class="bonus-result" id="bonusResult"></div>
    <button class="btn-share" onclick="shareResult()">ПОДЕЛИТЬСЯ 🎉</button>
    <button class="btn-retry" onclick="restartGame()">ПРОЙТИ ЕЩЁ РАЗ</button>
  </div>

</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
const questions = [
  {
    text: "Булочка прислал голосовое на 4 минуты. Ты:",
    options: [
      { letter: "A", text: "Слушаю со скоростью 2x 😄", correct: false },
      { letter: "B", text: "Слушаю внимательно, каждое слово", correct: true },
      { letter: "C", text: "Читаю расшифровку в телефоне", correct: false }
    ]
  },
  {
    text: "Булочка говорит «надо поговорить». Ты думаешь:",
    options: [
      { letter: "A", text: "Всё, конец 😱", correct: false },
      { letter: "B", text: "Наверное, хочет обсудить отпуск 🏖️", correct: true },
      { letter: "C", text: "Опять про ремонт...", correct: false }
    ]
  },
  {
    text: "Булочка смотрит твои рилс. Его внутренний монолог:",
    options: [
      { letter: "A", text: "«Моя жена такая талантливая!» 👏", correct: true },
      { letter: "B", text: "«Надо лайкнуть, а то заметит» 😅", correct: false },
      { letter: "C", text: "«Когда же это закончится...»", correct: false }
    ]
  },
  {
    text: "Булочка молчит уже 10 минут. Это значит:",
    options: [
      { letter: "A", text: "Просто залип в телефон 📱", correct: false },
      { letter: "B", text: "Обиделся 😤", correct: false },
      { letter: "C", text: "Что-то важное обдумывает", correct: true }
    ]
  },
  {
    text: "Булочка сказал «я сам приготовлю ужин». Это значит:",
    options: [
      { letter: "A", text: "Будут пельмени 🥟", correct: true },
      { letter: "B", text: "Он реально приготовит шедевр", correct: false },
      { letter: "C", text: "Закажет доставку и скажет «я старался»", correct: false }
    ]
  },
  {
    text: "Булочка выбирает фильм на вечер. Что это будет?",
    options: [
      { letter: "A", text: "Боевик с Джейсоном Стэтхемом 💥", correct: true },
      { letter: "B", text: "Романтическая комедия", correct: false },
      { letter: "C", text: "Документалка про космос", correct: false }
    ]
  },
  {
    text: "Булочка говорит «я буду через 5 минут». Сколько ждать реально?",
    options: [
      { letter: "A", text: "5 минут, он точный ⏰", correct: false },
      { letter: "B", text: "Минимум 20 минут", correct: true },
      { letter: "C", text: "Лучше не засекать", correct: false }
    ]
  },
  {
    text: "Булочка заходит в магазин «на минутку». Он купит:",
    options: [
      { letter: "A", text: "Только хлеб, как и планировал", correct: false },
      { letter: "B", text: "Полную тележку + «оно само в корзину упало»", correct: true },
      { letter: "C", text: "Ничего — забудет зачем пришёл", correct: false }
    ]
  },
  {
    text: "Булочка на диете. Что он ест в полночь?",
    options: [
      { letter: "A", text: "Ничего, сила воли железная 💪", correct: false },
      { letter: "B", text: "«Это же не еда, это перекус»", correct: true },
      { letter: "C", text: "Целый холодильник", correct: false }
    ]
  },
  {
    text: "Булочка потерял ключи. Его первая реакция:",
    options: [
      { letter: "A", text: "Спокойно проверит карманы 🧘", correct: false },
      { letter: "B", text: "«Кто трогал мои ключи?!»", correct: true },
      { letter: "C", text: "Вызовет слесаря сразу", correct: false }
    ]
  },
  {
    text: "Какой будильник ставит Булочка?",
    options: [
      { letter: "A", text: "Один, и встаёт с первого раза", correct: false },
      { letter: "B", text: "5 штук с разницей в 3 минуты", correct: true },
      { letter: "C", text: "Не ставит — просыпается сам", correct: false }
    ]
  },
  {
    text: "Булочка собирается в отпуск. Чемодан он пакует:",
    options: [
      { letter: "A", text: "За неделю, по списку", correct: false },
      { letter: "B", text: "За 15 минут до выхода 🏃", correct: true },
      { letter: "C", text: "Просит тебя собрать", correct: false }
    ]
  },
  {
    text: "Булочка говорит «мне ничего не надо на день рождения». Это значит:",
    options: [
      { letter: "A", text: "Реально ничего не надо", correct: false },
      { letter: "B", text: "Надо, но он хочет сюрприз 🎁", correct: true },
      { letter: "C", text: "Он забыл что скоро ДР", correct: false }
    ]
  },
  {
    text: "Булочка за рулём. Навигатор говорит «поверните направо». Он:",
    options: [
      { letter: "A", text: "Повернёт направо", correct: false },
      { letter: "B", text: "«Я знаю короткий путь» 🗺️", correct: true },
      { letter: "C", text: "Проедет мимо и развернётся", correct: false }
    ]
  },
  {
    text: "Булочка смотрит футбол. Ты заговорила. Он:",
    options: [
      { letter: "A", text: "Ставит на паузу и слушает", correct: false },
      { letter: "B", text: "«Угу... да... конечно...»", correct: true },
      { letter: "C", text: "Не слышит вообще", correct: false }
    ]
  },
  {
    text: "Булочка делает комплимент. Как это звучит?",
    options: [
      { letter: "A", text: "«Ты сегодня красивая» 🌹", correct: false },
      { letter: "B", text: "«Нормально выглядишь» (это максимум)", correct: false },
      { letter: "C", text: "«Ого, ну ты вообще!» 😍", correct: true }
    ]
  },
  {
    text: "Булочка заболел. Температура 37.1. Его поведение:",
    options: [
      { letter: "A", text: "«Я умираю, пиши завещание» 🤒", correct: true },
      { letter: "B", text: "Молча пьёт чай и отдыхает", correct: false },
      { letter: "C", text: "Идёт на работу как ни в чём не бывало", correct: false }
    ]
  },
  {
    text: "Что Булочка делает, когда ты плачешь?",
    options: [
      { letter: "A", text: "Обнимает и молчит 🤗", correct: true },
      { letter: "B", text: "Пытается решить проблему", correct: false },
      { letter: "C", text: "Паникует больше тебя", correct: false }
    ]
  },
  {
    text: "Булочка в IKEA. Сколько времени вы там проведёте?",
    options: [
      { letter: "A", text: "20 минут — зашёл, купил, вышел", correct: false },
      { letter: "B", text: "3 часа минимум + хотдог на выходе 🌭", correct: true },
      { letter: "C", text: "Он откажется заходить", correct: false }
    ]
  },
  {
    text: "Булочка выбирает подарок тебе. Его стратегия:",
    options: [
      { letter: "A", text: "Спросит у подруг", correct: false },
      { letter: "B", text: "Вспомнит что ты хотела 3 месяца назад 🧠", correct: true },
      { letter: "C", text: "Купит сертификат", correct: false }
    ]
  },
  {
    text: "Булочка и паук в ванной. Его реакция:",
    options: [
      { letter: "A", text: "Спокойно выносит на улицу 🕷️", correct: false },
      { letter: "B", text: "Зовёт тебя на помощь", correct: false },
      { letter: "C", text: "Героически побеждает, но потом расскажет об этом 10 раз", correct: true }
    ]
  },
  {
    text: "Как Булочка реагирует на «нам надо поговорить о наших отношениях»?",
    options: [
      { letter: "A", text: "Садится и внимательно слушает", correct: false },
      { letter: "B", text: "Внутренне паникует, внешне спокоен 😐", correct: true },
      { letter: "C", text: "«А что случилось?!»", correct: false }
    ]
  },
  {
    text: "Булочка моет посуду. Как он это делает?",
    options: [
      { letter: "A", text: "Тщательно, каждую тарелочку", correct: false },
      { letter: "B", text: "Быстро, но потом ты перемываешь 😅", correct: true },
      { letter: "C", text: "Включает посудомойку и говорит «готово»", correct: false }
    ]
  },
  {
    text: "Булочка видит милую собаку на улице. Он:",
    options: [
      { letter: "A", text: "Проходит мимо", correct: false },
      { letter: "B", text: "«СОБАКААА!» и бежит гладить 🐕", correct: true },
      { letter: "C", text: "Фотографирует издалека", correct: false }
    ]
  },
  {
    text: "Что Булочка делает перед сном?",
    options: [
      { letter: "A", text: "Читает книгу 📖", correct: false },
      { letter: "B", text: "Листает телефон «ещё 5 минут» (= час)", correct: true },
      { letter: "C", text: "Сразу засыпает", correct: false }
    ]
  },
  {
    text: "Булочка в ресторане. Как он выбирает блюдо?",
    options: [
      { letter: "A", text: "За 30 секунд — всегда одно и то же", correct: false },
      { letter: "B", text: "Изучает всё меню, потом берёт привычное 📋", correct: true },
      { letter: "C", text: "«Мне то же, что и ей»", correct: false }
    ]
  },
  {
    text: "Булочка забыл про годовщину. Как он выкрутится?",

let currentQuestion = 0;
let correctCount = 0;
let timerInterval = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateProgress() {
  document.getElementById('progressBar').style.width =
    ((currentQuestion / questions.length) * 100) + '%';
}

function startGame() {
  currentQuestion = 0;
  correctCount = 0;
  updateProgress();
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('questionBadge').textContent = `ВОПРОС ${currentQuestion + 1}`;
  document.getElementById('scoreBadge').textContent = `✓ ${correctCount}`;
  document.getElementById('questionText').textContent = q.text;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="letter">${opt.letter}</div><div class="text">${opt.text}</div>`;
    div.addEventListener('click', () => selectOption(i));
    container.appendChild(div);
  });

  showScreen('questionScreen');
  startTimer();
}

function startTimer() {
  let timeLeft = 15;
  const ring = document.getElementById('timerRing');
  const circumference = 150.8;
  ring.style.transition = 'none';
  ring.style.strokeDashoffset = '0';
  ring.style.stroke = '#f97316';
  document.getElementById('timerNumber').textContent = timeLeft;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timerNumber').textContent = timeLeft;
    ring.style.transition = 'stroke-dashoffset 1s linear';
    ring.style.strokeDashoffset = circumference * (1 - timeLeft / 15);
    if (timeLeft <= 5) ring.style.stroke = '#dc2626';

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      handleTimeout();
    }
  }, 1000);
}

function handleTimeout() {
  const q = questions[currentQuestion];
  const options = document.querySelectorAll('.option');
  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (q.options[i].correct) opt.classList.add('correct');
  });
  setTimeout(advance, 1200);
}

function selectOption(index) {
  clearInterval(timerInterval);
  const q = questions[currentQuestion];
  const options = document.querySelectorAll('.option');

  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (q.options[i].correct) opt.classList.add('correct');
  });

  if (q.options[index].correct) {
    correctCount++;
  } else {
    options[index].classList.add('wrong');
  }

  setTimeout(advance, 1200);
}

function advance() {
  currentQuestion++;
  updateProgress();

  if (currentQuestion >= questions.length) {
    showFinal();
  } else {
    showQuestion();
  }
}

function showFinal() {
  document.getElementById('progressBar').style.width = '100%';
  const pct = Math.round((correctCount / questions.length) * 100);

  let icon, title, color;
  if (correctCount >= 40) {
    icon = '🏆'; title = 'ТЫ ЗНАЕШЬ БУЛОЧКУ!'; color = '#16a34a';
  } else if (pct >= 50) {
    icon = '😏'; title = 'НЕПЛОХО, НО МОЖНО ЛУЧШЕ'; color = '#f59e0b';
  } else {
    icon = '😅'; title = 'ТЫ НЕ ЗНАЕШЬ БУЛОЧКУ...'; color = '#dc2626';
  }

  document.getElementById('finalIcon').textContent = icon;
  document.getElementById('finalTitle').textContent = title;
  document.getElementById('finalTitle').style.color = color;
  document.getElementById('finalSub').textContent = `${pct}% правильных ответов`;
  document.getElementById('finalScore').textContent = `${correctCount} / ${questions.length}`;
  document.getElementById('finalScore').style.color = color;

  const bonus = document.getElementById('bonusResult');
  if (correctCount >= 40) {
    bonus.innerHTML = '🎁 Поздравляем! Ты набрал 40+!<br>Тебя ждёт <b>бонусный приз</b>! 🎉';
    bonus.classList.add('visible');
  } else {
    bonus.classList.remove('visible');
  }

  showScreen('finalScreen');
  setTimeout(() => {
    document.getElementById('resultBar').style.width = pct + '%';
    document.getElementById('resultBar').style.background =
      `linear-gradient(90deg, ${color}, ${color}88)`;
  }, 100);
  if (correctCount >= 40) spawnConfetti();
  else if (pct >= 50) spawnConfetti();
}

function restartGame() {
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('resultBar').style.width = '0%';
  startGame();
}

function shareResult() {
  const pct = Math.round((correctCount / questions.length) * 100);
  const text = `🎂 Квиз ко Дню Рождения Бусинки — ${correctCount}/${questions.length} (${pct}%)! Попробуй тоже: ${location.href}`;
  if (navigator.share) {
    navigator.share({ title: 'Квиз ко Дню Рождения Бусинки', text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('Скопировано!'));
  }
}

function spawnConfetti() {
  const c = document.getElementById('confettiContainer');
  c.innerHTML = '';
  const colors = ['#f97316','#f59e0b','#ef4444','#8b5cf6','#3b82f6','#10b981','#ec4899'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = Math.random()*0.8+'s';
    p.style.animationDuration = (2+Math.random()*2)+'s';
    p.style.width = (4+Math.random()*6)+'px';
    p.style.height = (4+Math.random()*6)+'px';
    p.style.borderRadius = Math.random()>0.5?'50%':'2px';
    c.appendChild(p);
  }
  setTimeout(() => c.innerHTML='', 4000);
}

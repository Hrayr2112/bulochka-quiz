<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Специальный Квиз 2025</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a0f;
    color: #fff;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .app {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 0.5s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== WELCOME SCREEN ===== */
  .welcome-subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .welcome-title {
    text-align: center;
    margin-bottom: 8px;
  }
  .welcome-title .line1 {
    font-size: 42px;
    font-weight: 900;
    color: #f59e0b;
    display: block;
    line-height: 1.1;
  }
  .welcome-title .line2 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    display: block;
    line-height: 1.2;
  }
  .welcome-title .line3 {
    font-size: 42px;
    font-weight: 900;
    color: #f59e0b;
    display: block;
    line-height: 1.1;
  }

  .welcome-meta {
    font-size: 13px;
    color: #888;
    margin: 16px 0 30px;
  }

  .prize-card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 200px;
  }
  .prize-card img {
    width: 120px;
    height: auto;
    margin-bottom: 12px;
  }
  .prize-phone-placeholder {
    width: 100px;
    height: 140px;
    background: linear-gradient(135deg, #f97316, #fb923c);
    border-radius: 16px;
    margin-bottom: 12px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .prize-phone-placeholder::after {
    content: '';
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
  }
  .prize-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #999;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .prize-name {
    font-size: 18px;
    font-weight: 700;
    color: #111;
  }
  .prize-color {
    font-size: 13px;
    color: #f97316;
  }

  .dots {
    display: flex;
    gap: 6px;
    margin: 16px 0 30px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
  }
  .dot.active { background: #fff; }

  .btn-start {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff;
    border: none;
    padding: 16px 48px;
    border-radius: 40px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 1px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(249, 115, 22, 0.4);
  }
  .btn-start:active { transform: scale(0.96); }
  .btn-start .play-icon {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 6px 0 6px 10px;
    border-color: transparent transparent transparent #fff;
  }

  /* ===== QUESTION SCREEN ===== */
  .question-badge {
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 11px;
    letter-spacing: 3px;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .question-text {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    line-height: 1.4;
    margin-bottom: 24px;
    max-width: 340px;
  }

  .timer-container {
    position: relative;
    width: 56px;
    height: 56px;
    margin-bottom: 4px;
  }
  .timer-ring {
    transform: rotate(-90deg);
  }
  .timer-ring-bg {
    fill: none;
    stroke: #1a1a2e;
    stroke-width: 3;
  }
  .timer-ring-progress {
    fill: none;
    stroke: #f97316;
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }
  .timer-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
  }
  .timer-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .options {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    background: #12121e;
    border: 1px solid #1e1e30;
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .option:active { transform: scale(0.98); }
  .option .letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #1a1a2e;
    border: 1px solid #2a2a3e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    flex-shrink: 0;
  }
  .option .text {
    font-size: 15px;
    color: #ccc;
    line-height: 1.3;
  }

  .option.correct {
    background: #0a2e1a;
    border-color: #16a34a;
  }
  .option.correct .letter {
    background: #16a34a;
    border-color: #16a34a;
    color: #fff;
  }
  .option.correct .text { color: #fff; }

  .option.wrong {
    background: #2e0a0a;
    border-color: #dc2626;
  }
  .option.wrong .letter {
    background: #dc2626;
    border-color: #dc2626;
    color: #fff;
  }
  .option.wrong .text { color: #fff; }

  .option.disabled { pointer-events: none; }

  /* ===== LEVEL COMPLETE SCREEN ===== */
  .level-complete-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  .level-complete-title {
    font-size: 28px;
    font-weight: 800;
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
  }
  .level-complete-xp {
    font-size: 14px;
    color: #f59e0b;
    margin-bottom: 40px;
  }
  .btn-next {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff;
    border: none;
    padding: 16px 48px;
    border-radius: 40px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.2s;
    box-shadow: 0 4px 24px rgba(249, 115, 22, 0.4);
  }
  .btn-next:active { transform: scale(0.96); }

  /* ===== GAME OVER ===== */
  .gameover-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  .gameover-title {
    font-size: 26px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    color: #dc2626;
  }
  .gameover-sub {
    font-size: 14px;
    color: #888;
    text-align: center;
    margin-bottom: 32px;
  }
  .btn-retry {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff;
    border: none;
    padding: 16px 48px;
    border-radius: 40px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 4px 24px rgba(249, 115, 22, 0.4);
  }
  .btn-retry:active { transform: scale(0.96); }

  /* ===== FINAL WIN ===== */
  .final-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  .final-title {
    font-size: 28px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    color: #f59e0b;
  }
  .final-sub {
    font-size: 14px;
    color: #888;
    text-align: center;
    margin-bottom: 8px;
  }
  .final-xp {
    font-size: 18px;
    font-weight: 700;
    color: #f59e0b;
    margin-bottom: 32px;
  }
  .btn-share {
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff;
    border: none;
    padding: 16px 48px;
    border-radius: 40px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 4px 24px rgba(249, 115, 22, 0.4);
    margin-bottom: 16px;
  }
  .btn-share:active { transform: scale(0.96); }

  /* ===== CONFETTI ===== */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: confettiFall 3s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ===== PROGRESS BAR ===== */
  .progress-bar-container {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: #1a1a2e;
    z-index: 50;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #f97316, #f59e0b);
    transition: width 0.5s ease;
    border-radius: 0 2px 2px 0;
  }
</style>
</head>
<body>

<div class="progress-bar-container">
  <div class="progress-bar" id="progressBar" style="width: 0%"></div>
</div>

<div class="app">

  <!-- WELCOME -->
  <div class="screen active" id="welcomeScreen">
    <div class="welcome-subtitle">СПЕЦИАЛЬНЫЙ КВИЗ · 2025</div>
    <div class="welcome-title">
      <span class="line1">ЗНАЕШЬ</span>
      <span class="line2">ЛИ ТЫ</span>
      <span class="line3">БУЛОЧКУ?</span>
    </div>
    <div class="welcome-meta">5 уровней · 1 правильный путь · 1 большой приз</div>
    <div class="prize-card">
      <div class="prize-phone-placeholder"></div>
      <div class="prize-label">ГЛАВНЫЙ ПРИЗ</div>
      <div class="prize-name">iPhone 17</div>
      <div class="prize-color">Desert Orange 🧡</div>
    </div>
    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <button class="btn-start" onclick="startGame()">
      <div class="play-icon"></div>
      НАЧАТЬ ИГРУ
    </button>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="questionScreen">
    <div class="question-badge" id="questionBadge">ВОПРОС 1</div>
    <div class="question-text" id="questionText"></div>
    <div class="timer-container">
      <svg class="timer-ring" width="56" height="56" viewBox="0 0 56 56">
        <circle class="timer-ring-bg" cx="28" cy="28" r="24"/>
        <circle class="timer-ring-progress" id="timerRing" cx="28" cy="28" r="24"
          stroke-dasharray="150.8"
          stroke-dashoffset="0"/>
      </svg>
      <div class="timer-number" id="timerNumber">15</div>
    </div>
    <div class="timer-label">СЕКУНД</div>
    <div class="options" id="optionsContainer"></div>
  </div>

  <!-- LEVEL COMPLETE -->
  <div class="screen" id="levelCompleteScreen">
    <div class="level-complete-icon">🔥</div>
    <div class="level-complete-title">УРОВЕНЬ ПРОЙДЕН!</div>
    <div class="level-complete-xp" id="xpDisplay">+100 XP · Всего: 100 XP</div>
    <button class="btn-next" id="btnNext" onclick="nextLevel()">УРОВЕНЬ 2 →</button>
  </div>

  <!-- GAME OVER -->
  <div class="screen" id="gameOverScreen">
    <div class="gameover-icon">💔</div>
    <div class="gameover-title">НЕПРАВИЛЬНО!</div>
    <div class="gameover-sub">Ты не знаешь Булочку... пока что 😏</div>
    <button class="btn-retry" onclick="restartGame()">ПОПРОБОВАТЬ СНОВА</button>
  </div>

  <!-- FINAL WIN -->
  <div class="screen" id="finalScreen">
    <div class="final-icon">🏆</div>
    <div class="final-title">ТЫ ЗНАЕШЬ БУЛОЧКУ!</div>
    <div class="final-sub">Все 5 уровней пройдены!</div>
    <div class="final-xp" id="finalXp">500 XP</div>
    <button class="btn-share" onclick="shareResult()">ПОДЕЛИТЬСЯ 🎉</button>
    <button class="btn-retry" onclick="restartGame()">ПРОЙТИ ЕЩЁ РАЗ</button>
  </div>

</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
const questions = [
  {
    text: "Булочка прислал голосовое на 4 минуты. Ты:",
    options: [
      { letter: "A", text: "Слушаю со скоростью 2x 😄", correct: false },
      { letter: "B", text: "Слушаю внимательно, каждое слово", correct: true },
      { letter: "C", text: "Читаю расшифровку в телефоне", correct: false }
    ]
  },
  {
    text: "Булочка говорит «надо поговорить». Ты думаешь:",
    options: [
      { letter: "A", text: "Всё, конец 😱", correct: false },
      { letter: "B", text: "Наверное, хочет обсудить отпуск 🏖️", correct: true },
      { letter: "C", text: "Опять про ремонт...", correct: false }
    ]
  },
  {
    text: "Булочка смотрит твои рилс. Его внутренний монолог:",
    options: [
      { letter: "A", text: "«Моя жена такая талантливая!» 👏", correct: true },
      { letter: "B", text: "«Надо лайкнуть, а то заметит» 😅", correct: false },
      { letter: "C", text: "«Когда же это закончится...»", correct: false }
    ]
  },
  {
    text: "Булочка молчит уже 10 минут. Это значит:",
    options: [
      { letter: "A", text: "Просто залип в телефон 📱", correct: false },
      { letter: "B", text: "Обиделся 😤", correct: false },
      { letter: "C", text: "Что-то важное обдумывает", correct: true }
    ]
  },
  {
    text: "Булочка сказал «я сам приготовлю ужин». Это значит:",
    options: [
      { letter: "A", text: "Будут пельмени 🥟", correct: true },
      { letter: "B", text: "Он реально приготовит шедевр", correct: false },
      { letter: "C", text: "Закажет доставку и скажет «я старался»", correct: false }
    ]
  }
];

let currentQuestion = 0;
let xp = 0;
let timerInterval = null;
let timeLeft = 15;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateProgress() {
  const pct = (currentQuestion / questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function startGame() {
  currentQuestion = 0;
  xp = 0;
  updateProgress();
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('questionBadge').textContent = `ВОПРОС ${currentQuestion + 1}`;
  document.getElementById('questionText').textContent = q.text;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="letter">${opt.letter}</div><div class="text">${opt.text}</div>`;
    div.addEventListener('click', () => selectOption(i));
    container.appendChild(div);
  });

  showScreen('questionScreen');
  startTimer();
}

function startTimer() {
  timeLeft = 15;
  const ring = document.getElementById('timerRing');
  const circumference = 150.8;
  ring.style.transition = 'none';
  ring.style.strokeDashoffset = '0';
  document.getElementById('timerNumber').textContent = timeLeft;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timerNumber').textContent = timeLeft;
    const offset = circumference * (1 - timeLeft / 15);
    ring.style.transition = 'stroke-dashoffset 1s linear';
    ring.style.strokeDashoffset = offset;

    if (timeLeft <= 5) {
      ring.style.stroke = '#dc2626';
    } else {
      ring.style.stroke = '#f97316';
    }

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timeUp();
    }
  }, 1000);
}

function timeUp() {
  const options = document.querySelectorAll('.option');
  const q = questions[currentQuestion];
  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (q.options[i].correct) opt.classList.add('correct');
  });
  setTimeout(() => showScreen('gameOverScreen'), 1500);
}

function selectOption(index) {
  clearInterval(timerInterval);
  const q = questions[currentQuestion];
  const options = document.querySelectorAll('.option');

  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (q.options[i].correct) opt.classList.add('correct');
  });

  if (!q.options[index].correct) {
    options[index].classList.add('wrong');
    setTimeout(() => showScreen('gameOverScreen'), 1500);
    return;
  }

  xp += 100;
  currentQuestion++;
  updateProgress();

  if (currentQuestion >= questions.length) {
    setTimeout(() => {
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('finalXp').textContent = xp + ' XP';
      showScreen('finalScreen');
      spawnConfetti();
    }, 1000);
  } else {
    setTimeout(() => {
      document.getElementById('xpDisplay').textContent = `+100 XP · Всего: ${xp} XP`;
      document.getElementById('btnNext').textContent = `УРОВЕНЬ ${currentQuestion + 1} →`;
      showScreen('levelCompleteScreen');
      spawnConfetti();
    }, 1000);
  }
}

function nextLevel() {
  showQuestion();
}

function restartGame() {
  document.getElementById('progressBar').style.width = '0%';
  startGame();
}

function shareResult() {
  const text = `🏆 Я прошёл квиз "Знаешь ли ты Булочку?" и набрал ${xp} XP!\nПопробуй тоже!`;
  if (navigator.share) {
    navigator.share({ title: 'Квиз: Знаешь ли ты Булочку?', text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      alert('Скопировано в буфер обмена!');
    });
  }
}

function spawnConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#f97316', '#f59e0b', '#ef4444', '#8b5cf6', '#3b82f6', '#10b981', '#ec4899'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.width = (4 + Math.random() * 6) + 'px';
    piece.style.height = (4 + Math.random() * 6) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(piece);
  }
  setTimeout(() => container.innerHTML = '', 4000);
}
</script>

</body>
</html>
